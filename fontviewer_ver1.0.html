<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Viewer - Speed Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --card-bg: #f3f4f6;
            --meta-color: #666666;
            --accent-color: #3b82f6;
        }

        body.dark {
            --bg-color: #000000;
            --text-color: #ffffff;
            --card-bg: #141414;
            --meta-color: #999999;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            overflow: hidden;
            user-select: none; /* UI操作を快適に */
        }

        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* カードスタイル */
        .font-card {
            position: absolute; /* 仮想スクロールのために絶対配置 */
            top: 0; left: 0;
            background-color: var(--card-bg);
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            box-sizing: border-box;
            border: 2px solid transparent;
            transition: background-color 0.2s;
            contain: strict; /* 描画最適化 */
        }

        .font-card:hover {
            z-index: 10;
            border-color: #999;
        }

        .font-card.selected {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px var(--accent-color);
        }

        .font-card.pinned {
            background-color: rgba(59, 130, 246, 0.1);
        }
        body.dark .font-card.pinned {
            background-color: rgba(59, 130, 246, 0.2);
        }

        /* テキストプレビュー（縁取り対応） */
        .preview-text {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 10px;
            white-space: nowrap;
            /* 縁取りの魔法 */
            paint-order: stroke fill;
            -webkit-text-stroke-width: var(--stroke-width, 0);
            -webkit-text-stroke-color: var(--stroke-color, transparent);
        }

        /* 未対応文字（豆腐）の表示スタイル */
        .missing-box {
            display: inline-block;
            width: 0.8em;
            height: 0.8em;
            border: 1px solid currentColor; /* 文字色と同じ枠線 */
            position: relative;
            margin: 0 2px;
            vertical-align: middle;
            flex-shrink: 0;
            /* 縁取りの影響を受けないようにリセット */
            -webkit-text-stroke-width: 0; 
            paint-order: normal;
        }
        /* バツ印 */
        .missing-box::before, .missing-box::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            margin: auto;
            background-color: currentColor;
        }
        .missing-box::before { width: 100%; height: 1px; transform: rotate(45deg); }
        .missing-box::after { width: 100%; height: 1px; transform: rotate(-45deg); }

        /* ピンバッジ */
        .badge {
            position: absolute;
            top: 4px; right: 4px;
            width: 18px; height: 18px;
            background: var(--accent-color);
            color: white;
            border-radius: 50%;
            font-size: 11px;
            font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- ヘッダーエリア -->
    <div class="flex-none p-3 border-b border-gray-600 bg-opacity-90 backdrop-blur z-20 flex flex-col gap-2 shadow-lg" style="background: var(--card-bg);">
        
        <!-- 1段目: メイン操作 -->
        <div class="flex flex-wrap gap-3 items-center">
            <button id="btnLoad" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded text-sm font-bold shadow transition-transform active:scale-95">
                PCフォント読込
            </button>
            <div class="flex-1 flex gap-2 items-center min-w-[200px]">
                <span class="text-xs font-bold whitespace-nowrap">文章:</span>
                <!-- 背景白、文字黒、枠黒 (ダークモード: 背景黒、文字白、枠白) -->
                <input type="text" id="inputText" value="サンプル&Sample" 
                    class="flex-1 rounded px-2 py-1 text-sm focus:outline-none focus:border-blue-500
                           bg-white text-black border border-black 
                           dark:bg-black dark:text-white dark:border-white">
            </div>
            <div class="flex-1 flex gap-2 items-center min-w-[150px] relative">
                <span class="text-xs font-bold whitespace-nowrap">検索:</span>
                <!-- 背景白、文字黒、枠黒 (ダークモード: 背景黒、文字白、枠白) -->
                <input type="text" id="searchBox" placeholder="フォント名..." 
                    class="flex-1 rounded px-2 py-1 text-sm focus:outline-none focus:border-blue-500
                           bg-white text-black border border-black 
                           dark:bg-black dark:text-white dark:border-white">
                <button id="btnClearSearch" class="absolute right-1 text-gray-400 hover:text-red-500 hidden">×</button>
            </div>
        </div>

        <!-- 2段目: スタイルとサイズ -->
        <div class="flex flex-wrap gap-4 items-center text-sm">
            <label class="flex items-center gap-1 cursor-pointer select-none">
                <input type="checkbox" id="chkDark"> ダークモード
            </label>
            <div class="h-4 w-px bg-gray-400 mx-1"></div>
            <label class="flex items-center gap-1 cursor-pointer select-none font-bold">
                <input type="checkbox" id="chkBold"> 太字
            </label>
            <label class="flex items-center gap-1 cursor-pointer select-none italic">
                <input type="checkbox" id="chkItalic"> 斜体
            </label>
            
            <!-- サイズ調整エリア: 背景白、文字黒、枠黒 (ダークモード: 背景黒、文字白、枠白) -->
            <div class="flex items-center gap-2 ml-4 px-2 py-0.5 rounded
                        bg-white text-black border border-black
                        dark:bg-black dark:text-white dark:border-white">
                <span class="text-xs">サイズ:</span>
                <input type="range" id="sliderSize" min="12" max="150" value="32" class="w-24">
                <input type="number" id="numSize" min="12" max="150" value="32" 
                    class="w-12 text-center border-b focus:outline-none bg-transparent
                           border-black dark:border-white">
                <span class="text-xs">px</span>
            </div>
        </div>

        <!-- 3段目: カラー -->
        <div class="flex gap-4 items-center text-xs">
            <div class="flex items-center gap-1">
                <span>文字色:</span>
                <input type="color" id="colText" value="#000000" class="cursor-pointer border-none bg-transparent w-6 h-6 p-0">
            </div>
            <div class="flex items-center gap-1">
                <span>背景色:</span>
                <input type="color" id="colBg" value="#ffffff" class="cursor-pointer border-none bg-transparent w-6 h-6 p-0">
            </div>
            <div class="flex items-center gap-1 relative group">
                <span>縁取り:</span>
                <!-- input colorは非表示にし、ボタンで制御 -->
                <input type="color" id="colEdge" value="#ffffff" class="absolute opacity-0 w-0 h-0">
                <button id="btnEdge" class="border border-gray-400 rounded px-2 py-0.5 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 min-w-[60px]">なし</button>
                <div class="absolute bottom-full left-0 mb-1 bg-black text-white px-2 py-1 rounded opacity-0 group-hover:opacity-100 pointer-events-none whitespace-nowrap z-50">
                    左クリック: 色選択 / 右クリック: 解除
                </div>
            </div>
            
            <div class="ml-auto text-gray-500">
                Font Count: <span id="lblCount">0</span>
            </div>
        </div>
    </div>

    <!-- ピン留めエリア (固定表示) -->
    <div id="pinnedContainer" class="flex-none flex gap-2 p-2 overflow-x-auto border-b border-gray-600 hidden bg-opacity-50" style="min-height: 100px;">
        <!-- JSで描画 -->
    </div>
    <div id="hintMsg" class="text-center text-xs text-gray-500 py-1 flex-none bg-opacity-90" style="background:var(--bg-color)">
        フォントをクリックして [1]〜[5] キーで上部に固定
    </div>

    <!-- 仮想スクロールコンテナ -->
    <div id="scrollContainer" class="flex-1 relative overflow-y-auto overflow-x-hidden w-full">
        <!-- 高さ確保用のダミー要素 -->
        <div id="scrollSpacer" class="absolute top-0 left-0 w-full h-px pointer-events-none"></div>
        <!-- 実際のカードが配置されるコンテナ -->
        <div id="contentGrid" class="absolute top-0 left-0 w-full"></div>
        
        <!-- ウェルカムメッセージ -->
        <div id="welcome" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-0">
            <p class="text-lg text-gray-500 mb-2">左上の「PCフォント読込」を押してください</p>
            <p class="text-xs text-gray-400">※Chrome / Edge / Opera 等のブラウザ推奨</p>
        </div>
    </div>

    <script>
        // --- データ管理 ---
        const state = {
            allFonts: [],      // 全フォントデータ
            displayFonts: [],  // フィルタ後の表示リスト
            pinned: {1:null, 2:null, 3:null, 4:null, 5:null},
            selected: null,    // 選択中のフォント名
            // スタイル設定
            text: "サンプル&Sample",
            fontSize: 32,
            isBold: false,
            isItalic: false,
            isDark: false,
            colText: "#000000",
            colBg: null,       // nullなら自動
            colEdge: null,     // nullならなし
            search: ""
        };

        // --- レイアウト定数 ---
        const GAP = 10;
        const PADDING = 10;
        let cardWidth = 200;  // 動的に計算
        let cardHeight = 120; // 動的に計算
        let cols = 1;

        // --- DOM要素 ---
        const ui = {
            container: document.getElementById('scrollContainer'),
            spacer: document.getElementById('scrollSpacer'),
            content: document.getElementById('contentGrid'),
            pinned: document.getElementById('pinnedContainer'),
            welcome: document.getElementById('welcome'),
            count: document.getElementById('lblCount'),
            // 入力系
            btnLoad: document.getElementById('btnLoad'),
            input: document.getElementById('inputText'),
            search: document.getElementById('searchBox'),
            btnClrSearch: document.getElementById('btnClearSearch'),
            // 設定系
            chkDark: document.getElementById('chkDark'),
            chkBold: document.getElementById('chkBold'),
            chkItalic: document.getElementById('chkItalic'),
            slider: document.getElementById('sliderSize'),
            numSize: document.getElementById('numSize'),
            colText: document.getElementById('colText'),
            colBg: document.getElementById('colBg'),
            colEdge: document.getElementById('colEdge'),
            btnEdge: document.getElementById('btnEdge')
        };

        // --- グリフ判定用 ---
        // 判定用のキャンバスとコンテキストを1回だけ作成
        const checkCtx = document.createElement('canvas').getContext('2d');
        // 判定結果のキャッシュ (key: "FontName:Char" -> value: boolean)
        const glyphCache = new Map();

        // --- 初期化 ---
        function init() {
            // リスナー登録
            ui.btnLoad.onclick = loadFonts;
            ui.container.onscroll = onScroll;
            window.onresize = onResize;

            // 入力同期
            ui.input.oninput = (e) => { 
                state.text = e.target.value || " ";
                // 文字数等が変わるのでレイアウト再計算が必要
                updateCardMetrics();
                updateVirtualScrollHeight();
                render(); 
                renderPinned(); 
            };
            
            ui.search.oninput = (e) => {
                state.search = e.target.value.toLowerCase();
                ui.btnClrSearch.classList.toggle('hidden', !state.search);
                filterFonts();
            };
            ui.btnClrSearch.onclick = () => {
                ui.search.value = "";
                state.search = "";
                ui.btnClrSearch.classList.add('hidden');
                filterFonts();
            };

            // スタイル変更
            ui.chkDark.onchange = (e) => {
                state.isDark = e.target.checked;
                document.body.classList.toggle('dark', state.isDark);
                // プリセット色適用
                if (state.isDark) {
                    state.colText = "#ffffff";
                    state.colBg = "#141414";
                } else {
                    state.colText = "#000000";
                    state.colBg = "#ffffff";
                }
                ui.colText.value = state.colText;
                ui.colBg.value = state.colBg;
                render(); renderPinned();
            };
            
            ui.chkBold.onchange = (e) => { state.isBold = e.target.checked; render(); renderPinned(); };
            ui.chkItalic.onchange = (e) => { state.isItalic = e.target.checked; render(); renderPinned(); };

            // サイズ変更
            const setSize = (v) => {
                state.fontSize = parseInt(v);
                ui.slider.value = state.fontSize;
                ui.numSize.value = state.fontSize;
                updateCardMetrics();
                updateVirtualScrollHeight();
                render(); 
                renderPinned(); // ピン留めもサイズ変える
            };
            ui.slider.oninput = (e) => setSize(e.target.value);
            ui.numSize.oninput = (e) => setSize(e.target.value);

            // 色変更
            ui.colText.oninput = (e) => { state.colText = e.target.value; render(); renderPinned(); };
            ui.colBg.oninput = (e) => { state.colBg = e.target.value; render(); };

            // 縁取り (カスタムUI)
            ui.btnEdge.onclick = () => { ui.colEdge.click(); }; // 色選択開く
            ui.colEdge.oninput = (e) => {
                state.colEdge = e.target.value;
                updateEdgeUI();
                render(); renderPinned();
            };
            ui.btnEdge.oncontextmenu = (e) => {
                e.preventDefault();
                state.colEdge = null;
                updateEdgeUI();
                render(); renderPinned();
            };

            // キーボード操作 (1-5)
            document.onkeydown = (e) => {
                if (document.activeElement.tagName === "INPUT") return;
                if (e.key >= '1' && e.key <= '5') togglePin(parseInt(e.key));
            };

            updateCardMetrics();
            updateEdgeUI();
        }

        // --- フォント読込 ---
        async function loadFonts() {
            // 一般的な標準フォントリスト（APIが使えない場合のフォールバック）
            const standardFonts = [
                // Windows
                "Yu Gothic", "Yu Gothic UI", "Meiryo", "Meiryo UI", "MS PGothic", "MS Gothic", 
                "MS PMincho", "MS Mincho", "BIZ UDPGothic", "BIZ UDGothic", "UD Digi Kyokasho",
                "HGSGothicE", "HGSMinchoE", "HGMaruGothicMPRO", "Segoe UI", "Consolas",
                // Mac
                "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Hiragino Mincho ProN", "Osaka", 
                "Apple Color Emoji", "Monaco", "Menlo",
                // Standard Latin
                "Arial", "Arial Black", "Helvetica", "Verdana", "Tahoma", "Trebuchet MS", 
                "Times New Roman", "Georgia", "Garamond", "Courier New", "Comic Sans MS", "Impact",
                // Google / Other
                "Noto Sans JP", "Roboto", "Open Sans", "Lato"
            ];

            if (!window.queryLocalFonts) {
                alert("お使いのブラウザはローカルフォント取得(Local Font Access API)に対応していません。\n代わりに一般的な標準フォントリストを表示します。\n\n※全フォントを表示するにはChromeやEdgeの最新版をご利用ください。");
                state.allFonts = standardFonts.sort();
                finishLoad();
                return;
            }

            try {
                ui.btnLoad.textContent = "読込中...";
                const list = await window.queryLocalFonts();
                // 重複排除してソート
                const names = new Set();
                list.forEach(f => names.add(f.family));
                state.allFonts = Array.from(names).sort();
                finishLoad();
            } catch (e) {
                console.error(e);
                alert("フォントの読み込みが許可されませんでした。\n代わりに一般的な標準フォントリストを表示します。");
                state.allFonts = standardFonts.sort();
                finishLoad();
            }
        }

        function finishLoad() {
            ui.welcome.style.display = 'none';
            ui.btnLoad.style.display = 'none';
            ui.pinned.classList.remove('hidden');
            filterFonts();
        }

        function filterFonts() {
            if (!state.search) {
                state.displayFonts = state.allFonts;
            } else {
                state.displayFonts = state.allFonts.filter(f => f.toLowerCase().includes(state.search));
            }
            ui.count.textContent = state.displayFonts.length;
            updateVirtualScrollHeight();
            render();
        }

        // --- レイアウト計算 (自動フィット) ---
        function updateCardMetrics() {
            // 高さ計算
            const contentH = Math.max(state.fontSize * 1.5, 40);
            cardHeight = 24 + contentH + 10;

            // 幅計算 (自動フィット)
            // 標準的なフォントで現在のテキストの幅を計測し、それに基づいて枠幅を決める
            checkCtx.font = `${state.isBold?'bold':''} ${state.isItalic?'italic':''} ${state.fontSize}px sans-serif`;
            const textWidth = checkCtx.measureText(state.text).width;
            
            // パディング(左右20px) + 余裕(20px) + 最低幅(120px)
            cardWidth = Math.max(textWidth + 40, 120);

            ui.pinned.style.height = (cardHeight + 20) + "px";
        }

        function updateVirtualScrollHeight() {
            const w = ui.container.clientWidth;
            cols = Math.floor((w - PADDING * 2) / (cardWidth + GAP));
            if (cols < 1) cols = 1;

            const rows = Math.ceil(state.displayFonts.length / cols);
            const totalH = rows * (cardHeight + GAP) + PADDING * 2;
            ui.spacer.style.height = totalH + "px";
        }

        function onResize() {
            updateVirtualScrollHeight();
            render();
        }

        // --- 仮想スクロール描画 ---
        function onScroll() {
            requestAnimationFrame(render);
        }

        function render() {
            const scrollTop = ui.container.scrollTop;
            const viewHeight = ui.container.clientHeight;
            
            const rowHeight = cardHeight + GAP;
            const startRow = Math.floor(scrollTop / rowHeight);
            const endRow = Math.ceil((scrollTop + viewHeight) / rowHeight);
            
            const startIndex = startRow * cols;
            const endIndex = (endRow + 1) * cols;

            let html = "";
            
            for (let i = startIndex; i < endIndex; i++) {
                if (i >= state.displayFonts.length) break;
                if (i < 0) continue;

                const font = state.displayFonts[i];
                const r = Math.floor(i / cols);
                const c = i % cols;
                const top = PADDING + r * rowHeight;
                const left = PADDING + c * (cardWidth + GAP);

                let slot = 0;
                for(let k in state.pinned) if(state.pinned[k] === font) slot = k;

                html += createCardHtml(font, top, left, slot);
            }
            ui.content.innerHTML = html;
        }

        // --- グリフ（文字）がフォントに存在するか判定 ---
        function isGlyphSupported(fontName, char) {
            const key = fontName + ":" + char;
            if (glyphCache.has(key)) return glyphCache.get(key);

            const fontSize = "50px"; 
            
            // 比較用のベースフォントリスト
            const bases = ['sans-serif', 'serif', 'monospace'];
            
            let supported = false;
            
            for (const base of bases) {
                // ベースフォント単体の幅
                checkCtx.font = `${fontSize} ${base}`;
                const wBase = checkCtx.measureText(char).width;
                
                // 対象フォント + ベースフォントの幅
                // フォント名にスペースが含まれる場合の引用符対応を確実に行う
                checkCtx.font = `${fontSize} "${fontName}", ${base}`;
                const wTarget = checkCtx.measureText(char).width;
                
                // 幅が違えば、フォント独自のデザインが当たっているとみなす
                if (wBase !== wTarget) {
                    supported = true;
                    break;
                }
            }
            
            glyphCache.set(key, supported);
            return supported;
        }

        // --- HTMLエスケープ ---
        function escapeHtml(str) {
            return str.replace(/[&<>"']/g, function(m) {
                return {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                }[m];
            });
        }

        // --- テキストHTML生成 (1文字ずつ判定) ---
        function renderTextHtml(fontName, text) {
            let html = "";
            // サロゲートペア対応のために for...of を使用
            for (const char of text) {
                if (isGlyphSupported(fontName, char)) {
                    html += escapeHtml(char);
                } else {
                    html += `<span class="missing-box"></span>`;
                }
            }
            return html;
        }

        // --- カードHTML生成 ---
        function createCardHtml(font, top, left, slot) {
            const isPinned = slot > 0;
            const isSelected = state.selected === font;
            
            const weight = state.isBold ? 'bold' : 'normal';
            const style = state.isItalic ? 'italic' : 'normal';
            
            const bg = isPinned ? '' : (state.colBg || (state.isDark ? '#141414' : '#ffffff'));
            const borderCol = isSelected ? 'var(--accent-color)' : (state.isDark ? '#444' : '#ddd');
            
            const strokeW = state.colEdge ? (state.fontSize * 0.1) + 'px' : '0';
            const strokeC = state.colEdge || 'transparent';

            let cls = "font-card";
            if(isPinned) cls += " pinned";
            if(isSelected) cls += " selected";

            const badge = isPinned ? `<div class="badge">${slot}</div>` : '';
            const pinPrefix = isPinned ? `[${slot}] ` : '';

            const posStyle = (top !== null) 
                ? `width:${cardWidth}px; height:${cardHeight}px; transform:translate(${left}px, ${top}px);`
                : `width:${cardWidth}px; height:${cardHeight}px; position:relative; flex:none;`;

            // テキスト生成 (グリフ判定付き)
            const textContent = renderTextHtml(font, state.text);

            return `
                <div class="${cls}" style="${posStyle} background-color:${bg};" 
                     onclick="selectFont('${font}')" title="${font}">
                    <div style="font-size:10px; color:var(--meta-color); padding:4px 6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                        ${pinPrefix}${font}
                    </div>
                    <div class="preview-text" style="
                        font-family: '${font}'; 
                        font-size: ${state.fontSize}px;
                        font-weight: ${weight};
                        font-style: ${style};
                        color: ${state.colText};
                        --stroke-width: ${strokeW};
                        --stroke-color: ${strokeC};
                    ">
                        ${textContent}
                    </div>
                    ${badge}
                </div>
            `;
        }

        // --- ピン留め描画 ---
        function renderPinned() {
            let html = "";
            for(let i=1; i<=5; i++) {
                const f = state.pinned[i];
                if (f) {
                    html += createCardHtml(f, null, null, i);
                }
            }
            ui.pinned.innerHTML = html;
        }

        // --- アクション ---
        window.selectFont = (font) => {
            state.selected = font;
            render(); 
            renderPinned();
        };

        function togglePin(slot) {
            if (!state.selected) return;
            const target = state.selected;
            if (state.pinned[slot] === target) {
                state.pinned[slot] = null;
            } else {
                for(let k in state.pinned) if(state.pinned[k] === target) state.pinned[k] = null;
                state.pinned[slot] = target;
            }
            renderPinned();
            render();
        }

        function updateEdgeUI() {
            if (state.colEdge) {
                ui.btnEdge.textContent = "";
                ui.btnEdge.style.backgroundColor = state.colEdge;
                ui.btnEdge.style.border = "2px solid #888";
            } else {
                ui.btnEdge.textContent = "なし";
                ui.btnEdge.style.backgroundColor = "";
                ui.btnEdge.style.border = "";
            }
        }

        init();

    </script>
</body>
</html>
